<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sit Straight</title>
  <!-- Google Fonts: Outfit & Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- CSS Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Full-screen warning vignette -->
  <div id="slouch-alert-overlay" class="alert-overlay hidden">
    <div class="alert-overlay-content">
      <h2>SIT STRAIGHT</h2>
    </div>
  </div>

  <div class="app-container">
    <!-- Header -->
    <header class="app-header">
      <h1>Sit Straight</h1>
    </header>

    <!-- Simple Main Content -->
    <main class="simple-container">
      <div class="video-container">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="pose-canvas"></canvas>
        <div id="camera-loading" class="camera-loading-overlay">
          <div class="spinner"></div>
          <p>Starting Camera...</p>
        </div>
        <!-- Calibration Overlay -->
        <div id="calibration-overlay" class="calibration-overlay hidden">
          <div id="countdown-text" class="countdown-text">3</div>
        </div>
      </div>

      <div class="controls-panel">
        <div class="button-row">
          <button id="btn-calibrate" class="btn btn-primary" disabled>Calibrate Baseline</button>
          <button id="btn-reset-calibration" class="btn btn-secondary" disabled>Reset</button>
          <button id="btn-notifications" class="btn btn-secondary">Enable Notifications</button>
        </div>
        <div id="calibration-status" class="status-message">
          Waiting for camera feed to initialize...
        </div>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
